# Zero Trust Advisor Agent — Production Configuration
app:
  name: zero-trust-advisor-agent
  env: production
  debug: false
  log_level: WARN
  log_format: json

database:
  url: ${DATABASE_URL}
  pool_size: 20
  ssl: true

redis:
  url: ${REDIS_URL}
  cluster: true

vector_store:
  type: opensearch
  url: ${OPENSEARCH_URL}
  index: zero_trust_advisor_agent_vectors
  replicas: 1

llm:
  default_provider: openai
  model: gpt-4o
  temperature: 0.1
  fallback_provider: anthropic
  fallback_model: claude-sonnet-4-20250514

token_budget:
  user_daily: 50000
  org_monthly: 10000000

rate_limiting:
  requests_per_minute: 100

guardrails:
  enabled: true
  pii_redaction: true
  prompt_injection_detection: true

tracing:
  enabled: true
  sample_rate: 0.05

monitoring:
  prometheus: true
  alertmanager: true
